# yaml-language-server: $schema=https://abtree.dev/schemas/tree.schema.json
type: action
name: Change_Report
steps:
  - evaluate: "$LOCAL.initial_violations is set and $LOCAL.violations is set and $LOCAL.refactor_summary is a non-empty string"

  - instruct: >
      Compose a markdown change report comparing the initial SRP score to
      the post-refactor score. Required sections:

        # SRP change report — <YYYY-MM-DD HH:MM>

        ## Headline
        - Critical violations: <count in initial_violations> → <count in violations>
        - High violations:     <count in initial_violations> → <count in violations>
        - Total violations:    <count in initial_violations> → <count in violations>
        - Chosen target: $LOCAL.chosen_violation
        - Resolved? yes if $LOCAL.initial_top_violation no longer appears in
          $LOCAL.violations (compare by path), else no.

        ## Refactor summary
        $LOCAL.refactor_summary (verbatim, fenced as a code block)

        ## Score before
        Table: Path | Severity | Mixed responsibilities — rendered from
        $LOCAL.initial_violations.

        ## Score after
        Table: Path | Severity | Mixed responsibilities — rendered from
        $LOCAL.violations. If the list is empty, write "No remaining
        violations."

        ## Reports on disk
        - Initial: $LOCAL.initial_srp_report
        - Final:   $LOCAL.srp_report
        - Review:  inline below

        ## Final code review
        $LOCAL.review_report (verbatim)

      Write the markdown to ./SRP_CHANGE_REPORT.md (overwriting any prior
      copy). Save the path to $LOCAL.change_report.

  - evaluate: "$LOCAL.change_report is set"
