# yaml-language-server: $schema=https://abtree.dev/schemas/tree.schema.json
type: action
name: Final_Code_Review
steps:
  - evaluate: "$LOCAL.refactor_summary is a non-empty string"

  - instruct: >
      Run the code-review procedure documented at
      `fragments/code-review.md`. Read that file and follow its numbered
      steps verbatim, scoping the review to the changes captured in
      $LOCAL.refactor_summary (the diff produced during this session).

      The procedure orchestrates haiku/sonnet/opus subagents in parallel
      and ends with a filtered, high-signal issue list. Capture that
      final list (issue description + reason) as $LOCAL.review_report.
      If the list is empty, write `[]` — an empty list is a valid result.

  - evaluate: "$LOCAL.review_report is set"
