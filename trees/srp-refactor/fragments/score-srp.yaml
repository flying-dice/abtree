# yaml-language-server: $schema=https://abtree.dev/schemas/tree.schema.json
type: action
name: Score_SRP
steps:
  - instruct: >
      Score the codebase for Single Responsibility Principle violations.
      For every non-trivial module/file you assess, capture:
        - path
        - responsibilities mixed (list of distinct concerns the file owns)
        - severity (low | medium | high | critical)
        - one-line rationale (why those concerns shouldn't co-exist here)
      Save the list ranked most-critical-first to $LOCAL.violations.

  - instruct: >
      From $LOCAL.violations, write the top-ranked entry to
      $LOCAL.top_violation. Set $LOCAL.has_critical_violations to true if
      any entry has severity "high" or "critical", else false.

  - instruct: >
      Compose a markdown SRP report with these sections:

        # SRP report — <YYYY-MM-DD HH:MM>

        ## Summary
        (one paragraph: count of critical/high, the top concern, and
        whether the previously chosen violation — if $LOCAL.chosen_violation
        is set — is now resolved)

        ## Ranked violations
        (table: Path | Mixed responsibilities | Severity | Rationale —
        rendered from $LOCAL.violations)

        ## Top violation
        (rendered from $LOCAL.top_violation, with quoted code snippets
        where it clarifies the mix of concerns)

      Write the markdown to ./SRP_REPORT.md (overwriting any prior copy).
      Save the path to $LOCAL.srp_report.

  - evaluate: "$LOCAL.srp_report is set and $LOCAL.violations is set and $LOCAL.has_critical_violations is set"
