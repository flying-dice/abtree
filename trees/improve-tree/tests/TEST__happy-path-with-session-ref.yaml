feature: Improve_Tree scores a tree against a session, finds improvements, drafts a plan, and commits
tree: improve-tree
description: |
  Caller-seeded happy path. $LOCAL.session_ref is pre-set to a specific
  execution id, so Identify_Target uses it directly (skips the most-recent
  lookup). The parallel Score_And_Find pair writes its outputs, Draft_Plan
  composes a plan file under plans/, Commit_And_Push stages exactly that
  file and pushes to upstream.

background:
  initial:
    local:
      session_ref: "test-tree-run-localisation-formal-french__hello-world__1"

fixtures:
  side_effects:
    execution_read:
      id: test-tree-run-localisation-formal-french__hello-world__1
      tree: hello-world
      status: failure
      cursor: { path: [1, 0], step: 1 }
      evidence:
        nodes_reached: [Hello_World, Determine_Time, Choose_Greeting, Morning_Greeting]
        nodes_failed: [Morning_Greeting]
        retries_exhausted: []
        stage_halt: false
        local_keys_null:
          - greeting
        local_keys_populated:
          - time_of_day
    tree_yaml_read:
      path: .abtree/trees/hello-world/TREE.yaml
      bytes: 1820
    authoring_guide_load:
      command: "abtree docs author"
      bytes: 12480
    plan_write:
      path: plans/2026-05-11-improve-hello-world.md
      bytes: 2046
    git_commit:
      sha: 4a9f1c2bfa7d6e5e93a118b3b2a30a44b1d8e7c1
      message: "docs(plans): improve-tree review of hello-world (session test-tree-run-localisation-formal-french__hello-world__1)"
      files:
        - plans/2026-05-11-improve-hello-world.md
    git_push:
      remote: origin
      branch: main
      result: success

scenario:
  name: Caller-seeded session ref drives a full pass through scoring, drafting, and push
  given:
    - $LOCAL.session_ref is set to a specific execution id
  when:
    - Identify_Target uses $LOCAL.session_ref directly; reads execution JSON per fixtures.side_effects.execution_read
    - Identify_Target sets $LOCAL.tree_slug = "hello-world", writes session evidence to $LOCAL.session_evidence
    - Identify_Target evaluate → true ($LOCAL.tree_slug set, $LOCAL.session_evidence set)
    - Score_And_Find runs Score_Effectiveness and Find_Improvements in parallel
    - Score_Effectiveness writes $LOCAL.effectiveness_score = { score: 0.62, observations: [...] }
    - Find_Improvements writes $LOCAL.improvements = [reword Morning_Greeting instruct, add evaluate gate on language fallback, ...]
    - Draft_Plan evaluate → true (both parallel outputs are set)
    - Draft_Plan writes plans/2026-05-11-improve-hello-world.md per fixtures.side_effects.plan_write, stores $LOCAL.plan_path
    - Draft_Plan evaluate → true ($LOCAL.plan_path set)
    - Commit_And_Push evaluate → true ($LOCAL.plan_path set)
    - Commit_And_Push stages exactly $LOCAL.plan_path, commits per fixtures.side_effects.git_commit, pushes per fixtures.side_effects.git_push
    - Commit_And_Push captures HEAD SHA into $LOCAL.commit_sha
  then:
    local:
      session_ref: equals fixtures.side_effects.execution_read.id
      tree_slug: hello-world
      session_evidence: non-empty
      effectiveness_score: non-empty
      improvements: non-empty
      plan_path: equals fixtures.side_effects.plan_write.path
      commit_sha: equals fixtures.side_effects.git_commit.sha
    files:
      plan_path:
        exists: true
        frontmatter:
          status: draft
    git:
      sha: equals fixtures.side_effects.git_commit.sha
      pushed: true
    status: done
