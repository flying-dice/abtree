name: counter-demo
version: 1.1.0
description: |
  Bounded code-then-test pattern. Each pass increments $LOCAL.counter
  and tests whether the threshold has been reached. The root selector
  tries up to four passes — if none cross the threshold, the workflow
  fails. Demonstrates $ref by reusing the same Pass fragment four
  times.

state:
  local:
    counter: 0
    threshold: 3

tree:
  type: selector
  name: Reach_Threshold
  children:
    - $ref: "./fragments/pass.yaml"
    - $ref: "./fragments/pass.yaml"
    - $ref: "./fragments/pass.yaml"
    - $ref: "./fragments/pass.yaml"
