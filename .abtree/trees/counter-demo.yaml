name: counter-demo
version: 1.2.0
description: |
  Bounded code-then-test pattern using the runtime `retries` config.
  One Pass fragment is referenced once; the wrapping sequence retries
  it up to three times. Demonstrates the retries-as-runtime-config
  approach over hand-written N-pass selectors.

state:
  local:
    counter: 0
    threshold: 3

tree:
  type: sequence
  name: Reach_Threshold
  retries: 3
  children:
    - $ref: "./fragments/pass.yaml"
