feature: Improve_Tree scores a tree against a session, finds improvements, drafts a plan, and commits
tree: improve-tree
description: |
  Auto-pick happy path. $LOCAL.session_ref is null, so Identify_Target
  shells out to `abtree execution list`, picks the most recent
  non-current execution, and writes its id to $LOCAL.session_ref. The
  rest of the workflow proceeds as in the seeded case: parallel score
  + find, draft a plan, commit and push.

background:
  initial:
    local: {}   # session_ref deliberately null

fixtures:
  side_effects:
    execution_list:
      command: "abtree execution list"
      most_recent_non_current:
        id: test-tree-run-structured-logging-happy-p__refine-plan__1
        tree: refine-plan
        status: done
    execution_read:
      id: test-tree-run-structured-logging-happy-p__refine-plan__1
      tree: refine-plan
      status: done
      cursor: null
      evidence:
        nodes_reached: [Refine_Plan_Workflow, Understand_Intent, Write_Draft, Critique_Draft, Save_Plan, Codeowner_Approval, Approve_In_Session]
        nodes_failed: []
        retries_exhausted: []
        stage_halt: false
        local_keys_null:
          - draft_path
          - mr_url
        local_keys_populated:
          - change_request
          - intent_analysis
          - plan_path
          - codeowner_approved
    tree_yaml_read:
      path: .abtree/trees/refine-plan/TREE.yaml
      bytes: 7142
    authoring_guide_load:
      command: "abtree docs author"
      bytes: 12480
    plan_write:
      path: plans/2026-05-11-improve-refine-plan.md
      bytes: 1820
    git_commit:
      sha: 7c2bafc91d3e44a8915f6a3e2c0c7a1d1e8b9f02
      message: "docs(plans): improve-tree review of refine-plan (session test-tree-run-structured-logging-happy-p__refine-plan__1)"
      files:
        - plans/2026-05-11-improve-refine-plan.md
    git_push:
      remote: origin
      branch: main
      result: success

scenario:
  name: Auto-picked most-recent session drives a full pass through scoring, drafting, and push
  given:
    - $LOCAL.session_ref is null
    - at least one non-current execution exists on disk
  when:
    - Identify_Target shells `abtree execution list`, picks the most recent non-current execution per fixtures.side_effects.execution_list
    - Identify_Target writes $LOCAL.session_ref = "test-tree-run-structured-logging-happy-p__refine-plan__1"
    - Identify_Target reads the execution JSON per fixtures.side_effects.execution_read
    - Identify_Target sets $LOCAL.tree_slug = "refine-plan", writes session evidence to $LOCAL.session_evidence
    - Identify_Target evaluate → true ($LOCAL.tree_slug set, $LOCAL.session_evidence set)
    - Score_And_Find runs both children in parallel
    - Score_Effectiveness writes $LOCAL.effectiveness_score = { score: 0.81, observations: [...] }
    - Find_Improvements writes $LOCAL.improvements = [reword Save_Plan to write null draft_path immediately, ...]
    - Draft_Plan writes plans/2026-05-11-improve-refine-plan.md, stores $LOCAL.plan_path
    - Commit_And_Push commits and pushes per fixtures.side_effects.git_commit and git_push
  then:
    local:
      session_ref: equals fixtures.side_effects.execution_list.most_recent_non_current.id
      tree_slug: refine-plan
      session_evidence: non-empty
      effectiveness_score: non-empty
      improvements: non-empty
      plan_path: equals fixtures.side_effects.plan_write.path
      commit_sha: equals fixtures.side_effects.git_commit.sha
    files:
      plan_path:
        exists: true
        frontmatter:
          status: draft
    git:
      sha: equals fixtures.side_effects.git_commit.sha
      pushed: true
    status: done
