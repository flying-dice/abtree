feature: Improve_Codebase scores quality metrics, hardens a refactor queue, iterates, and verdicts
tree: improve-codebase
description: |
  Stage-halt path. The cycle reaches Iterative_Refactor with three items
  queued. The first item (dry-1) clears retries normally. The second
  (srp-1) cannot be implemented: after exhausting its 3 attempts on
  Refactor_Item (initial + retries: 2), the agent sets $LOCAL.stage_halt
  = true. On the next outer pass, Halt_Check's evaluate fails (stage is
  halted), the outer sequence's retries: 50 budget is consumed by
  repeated Halt_Check failures, and Iterative_Refactor ends in failure
  with done_log and failed_log preserved. Final_Reassessment never runs;
  the workflow surfaces failure before any verdict selector.

background:
  initial:
    local:
      change_request: "Reduce duplication across handlers and split the orders handler responsibilities."

fixtures:
  side_effects:
    scope_interpretation:
      human_confirmation:
        scope_confirmed: true
    baseline_test_run:
      command: "bun test"
      result: pass
    metric_scores_initial:
      score_dry: { score: 0.54 }
      score_srp: { score: 0.59 }
      score_coupling: { score: 0.72 }
      score_cohesion: { score: 0.71 }
    baseline_snapshot:
      dry: 0.54
      srp: 0.59
      coupling: 0.72
      cohesion: 0.71
    critique_outcome:
      kept:
        - { id: dry-1, metric: dry, threshold: 0.7, risk: low }
        - { id: srp-1, metric: srp, threshold: 0.7, risk: high }
        - { id: dry-2, metric: dry, threshold: 0.7, risk: med }
    triage_outcome:
      ordered: [dry-1, srp-1, dry-2]
      human_confirmation:
        triage_approved: true
    refactor_item_outcomes:
      dry-1:
        risk_branch: skip_critique
        regression_tests: { result: pass }
        reassess: { score: 0.83 }
      srp-1:
        risk_branch: high_risk_critique
        refactor_plan: { note: "blast-radius mapped" }
        attempts:
          - attempt: 1
            implementation: blocked
            regression_tests: { result: failure, failing_tests: ["tests/api/handlers/orders.test.ts > splits validator from writer"] }
          - attempt: 2
            implementation: blocked
            regression_tests: { result: failure }
          - attempt: 3
            implementation: blocked
            agent_action: "set $LOCAL.stage_halt = true; submit failure"

scenario:
  name: srp-1 is unrefactorable → stage_halt fires, outer retries exhaust on Halt_Check, cycle ends in failure
  given:
    - $LOCAL.change_request is set
    - $GLOBAL.test_command is set
  when:
    - Improve_Codebase runs cleanly through Check_Intent, Verify_Baseline, Score_Quality_Metrics, Snapshot_Baseline, Compile_Report, Critique_Findings, Lookup_Online, Triage_Refactor_Queue, Triage_Approval_Gate
    - Iterative_Refactor pass 1 — Halt_Check ok, dry-1 clears cleanly, recorded in done_log
    - Iterative_Refactor pass 2 — Halt_Check ok, current_item = srp-1
    - Refactor_Item srp-1 attempt 1 — Pre_Refactor_Critique High_Risk_Critique fills $LOCAL.refactor_plan; Implement_Refactor cannot complete; Regression_Test fails → Refactor_Item retries
    - Refactor_Item srp-1 attempt 2 — same outcome → Refactor_Item retries
    - Refactor_Item srp-1 attempt 3 — agent sets $LOCAL.stage_halt = true; submits failure
    - Iterative_Refactor outer pass 3 — Halt_Check evaluate → false ($LOCAL.stage_halt is true); action fails → outer retries fire repeatedly
    - Iterative_Refactor outer retries (retries 50) exhaust on Halt_Check; outer sequence fails
    - parent sequence Improve_Codebase aborts on Iterative_Refactor failure
    - srp-1 is appended to $LOCAL.failed_log on its final attempt
    - Final_Reassessment never runs; $LOCAL.final_scores remains null
  then:
    local:
      scope_confirmed: true
      baseline_tests_pass: true
      baseline_scores: non-empty
      done_log: non-empty
      failed_log: non-empty
      stage_halt: true
      final_scores: null
    runtime:
      retry_count:
        Refactor_Item: 2
    status: failure
