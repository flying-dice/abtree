name: code-review
version: 3.2.0
description: |
  Review a merge request / pull request. Defers the heavy lifting
  to a curated playbook stored alongside the tree at
  .abtree/playbooks/code-review.md. The playbook is exposed as a
  parameterless directive in $GLOBAL.code_review — the actions invoke
  it by name; the directive owns the read-and-return-text contract.
  abtree provides the workflow shell — skip-or-run gate, human
  publish gate, formal verdict selector.

  Install the playbook alongside the tree (see docs/examples.md).
  The path is project-relative; abtree always runs in the project
  root.

state:
  local:
    # Input
    mr_ref: null

    # Skip gate
    should_skip: null
    skip_reason: null

    # Output of the guidance run
    review_comments: null         # validated findings list

    # Human gate
    publish_approved: null        # true → post via review tool;
                                  # false → report locally only.

    # Verdict
    final_verdict: null

  global:
    code_review: |
      Read the file at .abtree/playbooks/code-review.md (relative to
      the project root) and return its full body as text. The text is
      a code-review playbook covering pre-flight skip checks, project-
      conventions loading, parallel review passes (conventions, bugs,
      introduced-code issues), the high-signal bar, per-finding
      validation, and posting / formatting rules.

tree:
  type: selector
  name: Code_Review_Or_Skip
  children:

    # ─── Branch 1: skip if the playbook's pre-flight says so ──────────
    - type: action
      name: Skip_Unreviewable
      steps:
        - evaluate: $LOCAL.mr_ref is set
        - instruct: >
            Use $GLOBAL.code_review's first-stage pre-flight check to
            assess $LOCAL.mr_ref — closed, draft, doesn't need review,
            or already reviewed by this tool.

            Set $LOCAL.should_skip = true if the pre-flight says skip,
            with $LOCAL.skip_reason populated. Otherwise
            should_skip = false. Do NOT proceed past the pre-flight
            in this action.
        - evaluate: $LOCAL.should_skip is true
        - instruct: >
            Report $LOCAL.skip_reason to the human and exit. The
            selector takes this branch; the review sequence does not
            run.

    # ─── Branch 2: full review pipeline ───────────────────────────────
    - type: sequence
      name: Code_Review_Workflow
      children:

        # 1. Apply the remote playbook against the MR.
        - type: action
          name: Run_Code_Review
          steps:
            - evaluate: $LOCAL.mr_ref is set
            - instruct: >
                Use $GLOBAL.code_review to review $LOCAL.mr_ref. Skip
                the pre-flight (already handled by Skip_Unreviewable)
                and the publishing step (handled separately below so a
                human can gate it).

                Capture the validated findings list at
                $LOCAL.review_comments. Shape per finding:
                  { file, lines, severity (blocking|non-blocking),
                    description, why_flagged, citation }.
                If validation drops every finding, store an empty
                list — that's a healthy outcome.

        # 2. Two-stage publish gate.
        - type: action
          name: Confirm_Publish
          steps:
            - evaluate: $LOCAL.review_comments is set
            - instruct: >
                Surface the validated findings to the human. Wait for
                them to call:
                  abtree local write <flow-id> publish_approved true
                  abtree local write <flow-id> publish_approved false
                Submit `running` while waiting. For autonomous CI
                runs, set publish_approved upfront when the flow is
                created.
            - evaluate: $LOCAL.publish_approved is set

        # 3. Verdict — selector gates on blocking findings; each
        #    branch posts conditionally based on publish_approved.
        - type: selector
          name: Approve_Or_Request_Changes
          children:
            - type: action
              name: Approve
              steps:
                - evaluate: $LOCAL.review_comments contains no blocking issues
                - instruct: >
                    All blocking checks passed. If
                    $LOCAL.publish_approved is true, use
                    $GLOBAL.code_review's posting / formatting rules
                    (suggestion blocks, full-SHA links, one comment per
                    finding) and submit an approval via the available
                    review tool. If publish_approved is false, report
                    locally without posting. Set $LOCAL.final_verdict
                    to "approved".

            - type: action
              name: Request_Changes
              steps:
                - instruct: >
                    Blocking issues found. If $LOCAL.publish_approved
                    is true, use $GLOBAL.code_review's posting rules to
                    post one inline comment per validated blocking
                    finding, then submit a request-changes review via
                    the available tool. If publish_approved is false,
                    report locally without posting. Set
                    $LOCAL.final_verdict to "changes_requested".
