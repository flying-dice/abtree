name: frontend-design
version: 2.1.0
description: |
  Design and implement a frontend from an approved spec. Defers the
  aesthetic-direction work to a remote markdown playbook exposed as
  a parameterless directive in $GLOBAL.frontend_design — the action
  invokes it by name; the directive owns the fetch-and-return-text
  contract. abtree provides the workflow shell — spec-approval gate,
  post-implementation quality check, and a fix-or-pass selector.

  Pin a specific commit SHA in the URL for stability; track main for
  the latest.

state:
  local:
    change_request: null
    spec_content: null
    implementation: null         # summary of what was built
    quality_result: null         # post-impl review against the spec

  global:
    frontend_design: |
      Fetch the markdown at
      https://raw.githubusercontent.com/anthropics/claude-code/main/plugins/frontend-design/skills/frontend-design/SKILL.md
      and return its full body as text. The text is a design-and-
      implement playbook covering tone selection, typography, colour
      commitment, motion, spatial composition, atmospheric back-
      grounds, and complexity matching.

tree:
  type: sequence
  name: Frontend_Design_Workflow
  children:

    # 1. Spec-approval gate — abtree-specific contract.
    - type: action
      name: Check_Spec_Approval
      steps:
        - evaluate: $LOCAL.change_request is set
        - instruct: >
            Find the spec in specs/ matching $LOCAL.change_request.
            Read its frontmatter and check the reviewed_by field.
            - If no spec exists: report that a spec must be created
              first via /abt refine. Return failure.
            - If reviewed_by is empty: report the spec needs codeowner
              approval. Return failure.
            - If reviewed_by has a name: store the full spec content
              at $LOCAL.spec_content.

    # 2. Apply the remote design playbook to the brief.
    - type: action
      name: Design_And_Implement
      steps:
        - evaluate: $LOCAL.spec_content is set
        - instruct: >
            Use $GLOBAL.frontend_design to design and implement the
            brief at $LOCAL.spec_content. Write the actual code to
            the workspace. Capture an implementation summary at
            $LOCAL.implementation:
              { aesthetic_direction, files_written, key_decisions,
                memorable_element }.

    # 3. Post-implementation quality check — abtree's own review pass
    #    that verifies the build delivered against the spec.
    - type: action
      name: Quality_Check
      steps:
        - evaluate: $LOCAL.implementation is set
        - instruct: >
            Use $GLOBAL.frontend_design to assess $LOCAL.implementation
            against $LOCAL.spec_content. Eight checks:
              1. Aesthetic direction matches the brief precisely.
              2. All specified animations / motion present.
              3. Typography is distinctive (no generic fallback).
              4. Colour palette is committed (no timid mid-tones).
              5. Spatial composition is interesting.
              6. Background / texture creates atmosphere.
              7. The memorable element is clear and intentional.
              8. Would pass as human-designed work from a top studio.
            Store assessment at $LOCAL.quality_result.

    # 4. Fix-or-pass selector — explicit branch in the trace.
    - type: selector
      name: Fix_Or_Pass
      children:
        - type: action
          name: Quality_Passed
          steps:
            - evaluate: $LOCAL.quality_result indicates all checks passed
            - instruct: >
                All quality checks passed. Frontend implementation is
                complete. Report a summary to the human covering
                $LOCAL.implementation.
        - type: action
          name: Apply_Fixes
          steps:
            - instruct: >
                Fix the issues called out in $LOCAL.quality_result.
                Apply changes without losing what works. Update
                $LOCAL.implementation with the fixed version.
