name: backend-design
version: 1.0.0
description: Design and implement a backend service from an approved spec with architectural critique and quality gates.

state:
  local:
    change_request: null
    spec_content: null
    context_analysis: null
    architecture_plan: null
    hardened_architecture: null
    implementation: null
    quality_result: null

tree:
  type: sequence
  name: Backend_Design_Workflow
  children:
    - type: action
      name: Check_Spec_Approval
      steps:
        - evaluate: $LOCAL.change_request is set
        - instruct: >
            Find the spec in specs/ matching $LOCAL.change_request. Check reviewed_by field.
            - If reviewed_by is empty: report the spec needs codeowner approval. Return failure.
            - If reviewed_by has a name: store the full spec at $LOCAL.spec_content.

    - type: action
      name: Analyze_Context
      steps:
        - evaluate: $LOCAL.spec_content is set
        - instruct: >
            Analyze $LOCAL.spec_content. Determine:
            - Purpose: What does this service/API do?
            - Consumers: Who calls it?
            - Data: What data does it own, read, or transform?
            - Scale: Expected load, latency requirements, consistency needs.
            - Constraints: Runtime, framework, existing infrastructure.
            Store analysis at $LOCAL.context_analysis.

    - type: action
      name: Choose_Architecture
      steps:
        - evaluate: $LOCAL.context_analysis is set
        - instruct: >
            Based on $LOCAL.context_analysis, define a clear architectural approach.
            Define: pattern, API design, data layer, error handling, validation, observability, security, module boundaries.
            Be opinionated. Match the solution to the problem.
            Store at $LOCAL.architecture_plan.

    - type: action
      name: Critique_Architecture
      steps:
        - evaluate: $LOCAL.architecture_plan is set
        - instruct: >
            Act as a Staff Backend Engineer. Evaluate $LOCAL.architecture_plan:
            Check for over-engineering, under-engineering, data integrity issues, failure modes, performance problems, security holes, testability, operational burden.
            Simplify where over-engineered. Harden where fragile. Output a hardened architecture plan.
            Store at $LOCAL.hardened_architecture.

    - type: action
      name: Implement_Backend
      steps:
        - evaluate: $LOCAL.hardened_architecture is set
        - instruct: >
            Implement the backend based on $LOCAL.hardened_architecture and $LOCAL.context_analysis.
            Write production-grade code: clean module boundaries, proper error handling, validation at boundaries, structured logging, health checks, env-based config, bounded queries, graceful shutdown.
            Store implementation summary at $LOCAL.implementation.

    - type: action
      name: Quality_Check
      steps:
        - evaluate: $LOCAL.implementation is set
        - instruct: >
            Review $LOCAL.implementation against $LOCAL.hardened_architecture. Check:
            1. Error handling covers actual failure modes
            2. Database operations bounded and indexed
            3. Validation present at boundaries
            4. Deployable and rollback-safe
            5. No injection or auth bypass vectors
            6. Structured logging at decision points
            7. Module structure matches plan
            8. Would pass production readiness review
            If any check fails, fix the issues directly in the code. Store quality assessment at $LOCAL.quality_result.

    - type: selector
      name: Fix_Or_Pass
      children:
        - type: action
          name: Quality_Passed
          steps:
            - evaluate: $LOCAL.quality_result indicates all checks passed
            - instruct: All quality checks passed. Implementation is complete.
        - type: action
          name: Apply_Fixes
          steps:
            - instruct: >
                Fix the issues identified in $LOCAL.quality_result.
                Apply changes without losing what already works.
                Update $LOCAL.implementation with the fixed version.
