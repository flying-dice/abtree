name: implement
version: 1.0.0
description: Plan and implement code changes from an approved spec, with complexity-gated architectural review.

state:
  local:
    change_request: null
    spec_content: null
    complexity_score: null
    has_frontend: null
    has_backend: null
    draft_plan: null
    hardened_plan: null
    online_reassurance: null
    opus_feedback: null
    git_diff: null
    backend_diff: null
    frontend_diff: null
  global:
    complexity_threshold: 0.75

tree:
  type: sequence
  name: Implementation_Workflow
  children:
    - type: action
      name: Check_Spec_Approval
      steps:
        - evaluate: $LOCAL.change_request is set
        - instruct: >
            Find the spec in specs/ matching $LOCAL.change_request.
            Read its frontmatter and check the reviewed_by field.
            - If no spec exists: report that a spec must be created first via /abt refine. Return failure.
            - If reviewed_by is empty: report the spec needs codeowner approval. Return failure.
            - If reviewed_by has a name: store the full spec content at $LOCAL.spec_content.

    - type: action
      name: Think
      steps:
        - evaluate: $LOCAL.spec_content is set
        - instruct: >
            Analyze $LOCAL.spec_content. Break down the exact files to modify, the logic required, and draft an implementation plan.
            Assign a complexity_score (0.0 to 1.0) and store at $LOCAL.complexity_score.
            Determine if this involves frontend work (store boolean at $LOCAL.has_frontend).
            Determine if this involves backend work (store boolean at $LOCAL.has_backend).
            Store the plan at $LOCAL.draft_plan.

    - type: action
      name: Critique
      steps:
        - evaluate: $LOCAL.draft_plan is set
        - instruct: >
            Act as a Senior Principal Engineer. Ruthlessly critique $LOCAL.draft_plan.
            Look for edge cases, performance bottlenecks, and security flaws.
            Output a revised, hardened plan. Store at $LOCAL.hardened_plan.

    - type: action
      name: Lookup_Online
      steps:
        - evaluate: $LOCAL.hardened_plan is set
        - instruct: >
            Search online for best practices and common pitfalls related to the core concept in $LOCAL.hardened_plan.
            Store findings at $LOCAL.online_reassurance.

    - type: selector
      name: Consult_Opus_If_Complex
      children:
        - type: action
          name: Consult_Opus
          steps:
            - evaluate: $LOCAL.complexity_score is greater than $GLOBAL.complexity_threshold
            - instruct: >
                The complexity is high. Delegate to an architect agent to review $LOCAL.hardened_plan and $LOCAL.online_reassurance.
                Validate the architectural approach. Store feedback at $LOCAL.opus_feedback.
        - type: action
          name: Skip_Opus
          steps:
            - instruct: >
                Complexity is low enough to proceed without architectural escalation.
                Store "skipped" at $LOCAL.opus_feedback.

    - type: selector
      name: Implementation_Path
      children:
        - type: action
          name: Implement_Backend
          steps:
            - evaluate: $LOCAL.has_backend is true and $LOCAL.has_frontend is not true
            - instruct: >
                Implement the backend changes based on $LOCAL.hardened_plan, incorporating $LOCAL.opus_feedback and $LOCAL.online_reassurance.
                Write the actual code to the workspace. Store a summary of changes at $LOCAL.git_diff.
        - type: action
          name: Implement_Frontend
          steps:
            - evaluate: $LOCAL.has_frontend is true and $LOCAL.has_backend is not true
            - instruct: >
                Implement the frontend changes based on $LOCAL.hardened_plan, incorporating $LOCAL.opus_feedback and $LOCAL.online_reassurance.
                Write the actual code to the workspace. Store a summary of changes at $LOCAL.git_diff.
        - type: parallel
          name: Implement_Both
          children:
            - type: action
              name: Implement_Backend_Part
              steps:
                - evaluate: $LOCAL.has_backend is true and $LOCAL.has_frontend is true
                - instruct: >
                    Implement the backend portion of $LOCAL.hardened_plan.
                    Focus on API/service layer, data models, and server-side logic.
                    Store backend changes at $LOCAL.backend_diff.
            - type: action
              name: Implement_Frontend_Part
              steps:
                - evaluate: $LOCAL.has_frontend is true and $LOCAL.has_backend is true
                - instruct: >
                    Implement the frontend portion of $LOCAL.hardened_plan.
                    Focus on UI components, styling, and client-side logic.
                    Store frontend changes at $LOCAL.frontend_diff.
