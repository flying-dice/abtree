stages:
  - check
  - test
  - docs
  - release

# ---- Reused pieces -----------------------------------------------------------

.bun:
  image: oven/bun:latest
  before_script:
    - bun install --frozen-lockfile

# ---- Stage: check ------------------------------------------------------------

# Biome — formatter + lint. Fails the pipeline on formatting or lint errors.
biome:
  extends: .bun
  stage: check
  script:
    - bunx biome ci .

# Schema freshness — regenerate tree.schema.json from src/schemas.ts and fail
# if the committed file differs. Forces contributors to run `bun run schema`
# whenever they touch the zod schema. The bun image has no git, so we copy
# the committed file aside and use coreutils diff instead of git diff.
schema:
  extends: .bun
  stage: check
  script:
    - cp tree.schema.json /tmp/tree.schema.committed.json
    - bun run schema
    - diff -u /tmp/tree.schema.committed.json tree.schema.json

# ---- Stage: test -------------------------------------------------------------

# Run bun test against the integration test (hello-world) and the
# deterministic harness in tests/cases/*.yaml.
test:
  extends: .bun
  stage: test
  script:
    - bun test

# ---- Stage: docs -------------------------------------------------------------

# Verify that the docs build succeeds. Runs generate-examples (which compiles
# pages from the actual TREE.yaml sources) then vitepress build, so a broken
# tree file or template will fail here rather than silently on the docs deploy.
docs:build:
  extends: .bun
  stage: docs
  script:
    - bun run docs:build
  artifacts:
    paths:
      - docs/.vitepress/dist
    expire_in: 1 day
    when: always

# ---- Stage: release ----------------------------------------------------------

# semantic-release runs only on main, only after check + test pass,
# and only when manually triggered from the pipeline view. Builds the
# cross-platform binaries via the prepare step in .releaserc and
# publishes them to the GitHub mirror's releases page.
release:
  extends: .bun
  stage: release
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  before_script:
    - apt-get update -qq && apt-get install -y -qq git ca-certificates
    - git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/flying-dice/abtree.git"
    # Wipe any local tags from the gitlab clone, then force-fetch tags from
    # origin (=github). semantic-release's own `git fetch --tags` does not
    # use --force, so any pre-existing local tag pointing at a different
    # object than github's would clobber-fail the fetch.
    - git tag -l | xargs -r git tag -d
    - git fetch --tags --force origin
    - bun install --frozen-lockfile
    # `bun publish` reads the token from .npmrc. NPM_TOKEN is set as a
    # protected + masked CI/CD variable; it must be an "Automation" token
    # so the publish doesn't prompt for 2FA.
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
  script:
    - bunx semantic-release
